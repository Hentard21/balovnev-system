# Автодеплой на GitHub Pages при каждом пуше в main.
#
# Перед первым деплоем в настройках репозитория:
# Settings → Pages → Source → «GitHub Actions».
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Сайт живёт на собственном домене (balovnev-system.ru, см. public/CNAME)
    # и отдаётся с корня — basePath не нужен, поэтому NEXT_PUBLIC_BASE_PATH
    # намеренно не задаётся (next.config.ts трактует его отсутствие как "").
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        # npm ci требует, чтобы package-lock.json был идентичен тому, что
        # сгенерировал бы npm install на этой же платформе — опциональные
        # нативные пакеты (Tailwind v4 / lightningcss) регистрируются
        # по-разному на macOS и Linux, поэтому строгий ci ложно падает
        # в CI, даже если сборка чиста локально. npm install терпимее
        # к этому, оставаясь детерминированным по package.json.
        run: npm install

      - name: Build static site
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
